<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Door Notify</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a18;
    --paper: #f5f0e8;
    --accent: #c84b2f;
    --muted: #8a8478;
    --border: #d4cfc4;
  }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .container { width: 100%; max-width: 420px; }

  header { margin-bottom: 2rem; text-align: center; }

  .eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 2rem;
    line-height: 1.1;
  }

  h1 em { font-style: italic; font-weight: 300; color: var(--accent); }

  .subtitle { margin-top: 0.75rem; font-size: 0.75rem; color: var(--muted); line-height: 1.6; }

  #buttons { display: flex; flex-direction: column; gap: 0.85rem; }

  .door-btn {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    width: 100%;
    padding: 1rem 1.1rem;
    background: #fff;
    color: var(--ink);
    border: 1.5px solid var(--border);
    border-radius: 2px;
    box-shadow: 4px 4px 0 var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    text-align: left;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .door-btn .emoji { font-size: 1.4rem; }
  .door-btn:hover { background: var(--paper); }
  .door-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--border); }
  .door-btn:disabled { opacity: 0.5; cursor: default; }

  #status {
    margin-top: 1.5rem;
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
    min-height: 1.2em;
  }

  #status.sent { color: var(--accent); }
</style>
</head>
<body>

<div class="container">
  <header>
    <p class="eyebrow">Door Notify</p>
    <h1>Tap what<br><em>brings you</em> here.</h1>
    <p class="subtitle">This sends a notification straight through — no app or sign-in needed.</p>
  </header>

  <div id="buttons"></div>
  <p id="status"></p>
</div>

<script>
  // ponytail: config lives in a Gist, not here — edit buttons by editing the Gist, no redeploy needed.
  const GIST_RAW_URL = 'https://gist.githubusercontent.com/benny1979/408a494b998c2a4a5b1a0d3079b8ebae/raw/buttons.json';
  const PIPEDREAM_WEBHOOK_URL = 'PASTE_PIPEDREAM_WEBHOOK_URL_HERE';

  const buttonsEl = document.getElementById('buttons');
  const statusEl = document.getElementById('status');

  async function loadButtons() {
    try {
      const res = await fetch(GIST_RAW_URL, { cache: 'no-store' });
      const buttons = await res.json();
      buttonsEl.innerHTML = '';
      buttons.forEach(b => {
        const btn = document.createElement('button');
        btn.className = 'door-btn';
        const emoji = document.createElement('span');
        emoji.className = 'emoji';
        emoji.textContent = b.emoji || '';
        const label = document.createElement('span');
        label.textContent = b.label;
        btn.append(emoji, label);
        btn.addEventListener('click', () => send(b, btn));
        buttonsEl.appendChild(btn);
      });
    } catch (err) {
      statusEl.textContent = 'Could not load options — try again in a moment.';
    }
  }

  async function send(button, el) {
    document.querySelectorAll('.door-btn').forEach(b => b.disabled = true);
    statusEl.classList.remove('sent');
    statusEl.textContent = 'Sending…';
    try {
      await fetch(PIPEDREAM_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: button.title, message: button.message })
      });
      statusEl.textContent = 'Sent — thank you.';
      statusEl.classList.add('sent');
    } catch (err) {
      statusEl.textContent = 'Something went wrong — please try again.';
      document.querySelectorAll('.door-btn').forEach(b => b.disabled = false);
    }
  }

  loadButtons();
</script>
</body>
</html>
